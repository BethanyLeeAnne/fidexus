          {user && <button onClick={() => { setPage("dashboard"); setOpen(false); }} className="w-full text-left py-3 text-sm font-bold text-amber-400 border-b border-blue-700 mb-1 flex items-center gap-2"><Home size={14} /> My Dashboard</button>}
          {links.map(l => <button key={l.p} onClick={() => { setPage(l.p); setOpen(false); }} className="block w-full text-left py-3 text-sm font-medium text-blue-200 hover:text-white border-b border-blue-700 border-opacity-40">{l.label}</button>)}
          <div className="flex gap-2 mt-3 pt-3">
            {user ? <>
              <button onClick={() => { setPage("inbox"); setOpen(false); }} className="flex-1 text-sm font-medium text-blue-200 border border-blue-600 py-2 rounded-lg">Inbox</button>
              <button onClick={() => { setPage("profile"); setOpen(false); }} className="flex-1 text-sm font-medium text-blue-200 border border-blue-600 py-2 rounded-lg">Profile</button>
              <button onClick={() => { onLogout(); setOpen(false); }} className="flex-1 text-sm font-medium text-red-300 border border-blue-600 py-2 rounded-lg">Sign Out</button>

              <button onClick={() => { setAuthModal("login"); setOpen(false); }} className="flex-1 text-sm text-blue-200 border border-blue-600 py-2 rounded-lg">Sign In</button>

    </nav>
  );
}

function PrayerCard({ request: init }) {
  const [req, setReq] = useState(init);

  return (
    <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
      <div className="flex items-start justify-between mb-3"><div><p className="font-bold text-gray-900 text-sm">{req.author}</p>{req.church&&<p className="text-xs text-gray-400">{req.church}</p>}</div><span className="text-xs text-gray-400">{req.timeAgo}</span></div>
      <p className="text-sm text-gray-700 leading-relaxed mb-4">{req.text}</p>
      <button onClick={toggle} className={`flex items-center gap-2 text-sm font-bold px-4 py-2 rounded-xl transition-colors ${req.hasPrayed?"bg-purple-600 text-white":"bg-purple-50 text-purple-700 hover:bg-purple-100"}`}><Heart size={14} fill={req.hasPrayed?"currentColor":"none"}/> {req.hasPrayed?"Prayed &#10003;":"I'll Pray"} &#183; {req.prayedCount}</button>

// &#9472;&#9472;&#9472; Daily Bread &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;

// &#9472;&#9472;&#9472; Caring Ministry Feed &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
function CaringMinistryFeed({ compact=false, churchFilter=null }) {
  const [signedUp, setSignedUp] = useState({});
  const items = CARING_NEEDS.filter(n => !n.fulfilled && (!churchFilter || n.church===churchFilter)).slice(0, compact?3:10);
  if (items.length===0) return <p className="text-gray-400 text-sm text-center py-6">No active needs right now.</p>;
  return (
    <div className="space-y-3">
      {items.map(n => (
        <div key={n.id} className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
          <div className="flex items-start gap-3">
            <span className={`text-xs font-bold px-2.5 py-1 rounded-full flex-shrink-0 ${categoryColor[n.category]||"bg-gray-100 text-gray-800"}`}>{n.category}</span>
            <div className="flex-1 min-w-0"><p className="font-bold text-gray-900 text-sm">{n.title}</p><p className="text-xs text-gray-400 mb-1">{n.church} &#183; {n.date}</p><p className="text-sm text-gray-600 leading-relaxed">{n.description}</p>{n.volunteersNeeded>0&&<div className="mt-2"><div className="h-1.5 bg-gray-100 rounded-full overflow-hidden"><div className="h-full bg-green-500 rounded-full" style={{width:`${pct(n.volunteersSignedUp,n.volunteersNeeded)}%`}}/></div><p className="text-xs text-gray-400 mt-0.5">{n.volunteersSignedUp}/{n.volunteersNeeded} volunteers</p></div>}</div>
            {n.volunteersNeeded>0&&<button onClick={() => setSignedUp(s=>({...s,[n.id]:!s[n.id]}))} className={`flex-shrink-0 text-xs font-bold px-3 py-1.5 rounded-lg transition-colors ${signedUp[n.id]?"bg-green-600 text-white":"bg-green-50 text-green-700 hover:bg-green-100"}`}>{signedUp[n.id]?"Signed Up &#10003;":"Sign Up"}</button>}
          </div>
        </div>
      ))}
    </div>
  );
}

// &#9472;&#9472;&#9472; Join Church Modal &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;

  const [selectedGroup, setSelectedGroup] = useState(null);
  const [intro, setIntro] = useState("");

    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-60" onClick={onClose}>

          <div className="flex items-center gap-2">{[1,2,3,4].map(s=><div key={s} className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold ${step===s?"bg-blue-900 text-white":step>s?"bg-green-500 text-white":"bg-gray-100 text-gray-400"}`}>{step>s?"&#10003;":s}</div>)}</div>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600"><X size={20}/></button>
        </div>
        <div className="p-6">

        {tab==="bulletins"&&<div className="space-y-4"><h2 className="font-extrabold text-gray-900 text-xl">Church Bulletins</h2>{ANNOUNCEMENTS.filter(a=>a.churchName===church.name).map(a=><div key={a.id} className="bg-white rounded-2xl p-6 shadow-sm"><div className="flex items-start justify-between mb-2"><h3 className="font-extrabold text-gray-900">{a.title}</h3><span className="text-xs text-gray-400 ml-4 flex-shrink-0">{a.sentAt}</span></div><p className="text-gray-600 leading-relaxed">{a.body}</p></div>)}{ANNOUNCEMENTS.filter(a=>a.churchName===church.name).length===0&&<p className="text-gray-400 text-center py-10">No bulletins posted yet.</p>}</div>}
        {tab==="groups"&&<div className="space-y-4"><h2 className="font-extrabold text-gray-900 text-xl">Small Groups & Ministries</h2><div className="grid grid-cols-1 sm:grid-cols-2 gap-4">{church.groups.map(g=><div key={g.id} className="bg-white rounded-2xl p-5 shadow-sm"><span className={`text-xs font-bold px-2.5 py-1 rounded-full ${groupTypeColor[g.type]||"bg-gray-100 text-gray-700"}`}>{g.type}</span><h3 className="font-extrabold text-gray-900 mt-2 mb-1">{g.name}</h3><p className="text-sm text-gray-400 mb-3 flex items-center gap-1"><Clock size={12}/>{g.day} &#183; {g.members} members</p><button onClick={()=>setJoinedGroups(j=>({...j,[g.id]:!j[g.id]}))} className={`w-full font-bold py-2 rounded-xl text-sm transition-colors ${joinedGroups[g.id]?"bg-green-600 text-white":"bg-blue-50 text-blue-900 hover:bg-blue-100"}`}>{joinedGroups[g.id]?"Joined &#10003;":"Join Group"}</button></div>)}</div></div>}
        {tab==="media"&&<div className="space-y-4"><h2 className="font-extrabold text-gray-900 text-xl">Media & Sermons</h2>{church.livestream?<div className="bg-white rounded-2xl p-6 shadow-sm"><div className="aspect-video bg-gray-100 rounded-xl flex items-center justify-center mb-4"><div className="text-center"><Video size={48} className="text-gray-300 mx-auto mb-2"/><p className="text-gray-400 font-semibold">Live Stream</p><p className="text-sm text-blue-700 font-bold mt-1">{church.livestream}</p></div></div><div className="grid grid-cols-1 sm:grid-cols-3 gap-3">{[{title:"This Sunday's Sermon",date:"Mar 22, 2026",dur:"42 min"},{title:"Midweek Teaching",date:"Mar 18, 2026",dur:"35 min"},{title:"Youth Service",date:"Mar 15, 2026",dur:"28 min"}].map((s,i)=><div key={i} className="bg-gray-50 rounded-xl p-3"><p className="font-bold text-gray-900 text-sm">{s.title}</p><p className="text-xs text-gray-400 mt-1">{s.date} &#183; {s.dur}</p><button className="text-xs font-bold text-blue-700 mt-2 hover:underline flex items-center gap-1"><Video size={11}/> Watch</button></div>)}</div></div>:<div className="text-center py-12 bg-white rounded-2xl shadow-sm"><Video size={48} className="text-gray-200 mx-auto mb-3"/><p className="text-gray-400">No live stream available for this church.</p></div>}</div>}
        {tab==="prayer"&&<div className="space-y-4 max-w-2xl"><h2 className="font-extrabold text-gray-900 text-xl">Prayer Wall</h2><p className="text-gray-400 text-sm">Prayer requests from {church.name} members.</p>{PRAYER_REQUESTS.filter(r=>r.church===church.name).map(r=><PrayerCard key={r.id} request={r}/>)}{PRAYER_REQUESTS.filter(r=>r.church===church.name).length===0&&<p className="text-gray-400 text-center py-10">No prayer requests yet.</p>}</div>}
        {tab==="give"&&(
          <div className="max-w-lg">
            {giveStep==="form"&&(
              <div className="space-y-5">
                <div className="bg-white rounded-2xl p-6 shadow-sm">

                  <h3 className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3">What would you like to support?</h3>
                  <div className="grid grid-cols-2 sm:grid-cols-3 gap-2 mb-5">
                    {GIVING_CATEGORIES.map(cat=>(
                      <button key={cat.id} onClick={() => setGiveCategory(cat.id)} className={`p-3 rounded-xl border-2 text-left transition-colors ${giveCategory===cat.id?"border-blue-900 bg-blue-50":"border-gray-100 bg-white hover:border-gray-200"}`}>
                        <span className="text-lg block mb-0.5">{cat.icon}</span>
                        <p className="font-bold text-gray-900 text-xs">{cat.name}</p>
                        <p className="text-xs text-gray-400 leading-tight">{cat.desc}</p>
                      </button>
                    ))}
                  </div>
                  <h3 className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3">Amount</h3>
                  <div className="grid grid-cols-4 gap-2 mb-3">{["25","50","100","200"].map(a=><button key={a} onClick={()=>setAmt(a)} className={`py-2.5 rounded-xl font-bold text-sm ${amt===a?"bg-blue-900 text-white":"bg-gray-100 text-gray-700 hover:bg-gray-200"}`}>${a}</button>)}</div>
                  <div className="relative mb-5"><span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold">$</span><input type="number" value={amt} onChange={e=>setAmt(e.target.value)} className="w-full border border-gray-200 rounded-xl pl-8 pr-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"/></div>
                  <h3 className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3">Frequency</h3>
                  <div className="flex gap-2 mb-5">
                    {["one-time","weekly","monthly","annually"].map(f=><button key={f} onClick={() => { setFrequency(f); setRecurring(f!=="one-time"); }} className={`flex-1 py-2 rounded-xl text-xs font-bold capitalize transition-colors ${frequency===f?"bg-blue-900 text-white":"bg-gray-100 text-gray-600 hover:bg-gray-200"}`}>{f}</button>)}
                  </div>
                  <label onClick={() => setIsPledge(p=>!p)} className="flex items-center gap-3 mb-5 cursor-pointer p-3 rounded-xl border-2 border-dashed transition-colors border-gray-200 hover:border-blue-200">
                    <div className={`w-5 h-5 rounded border-2 flex items-center justify-center transition-colors ${isPledge?"bg-blue-900 border-blue-900":"border-gray-300"}`}>{isPledge&&<Check size={11} className="text-white"/>}</div>
                    <div><p className="text-sm font-bold text-gray-900">Make this a pledge commitment</p><p className="text-xs text-gray-400">Commit to give this amount for a set period</p></div>
                  </label>
                  {isPledge&&<div className="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-5"><p className="text-xs font-bold text-amber-700 mb-2 uppercase tracking-wide">Pledge Duration</p><div className="flex gap-2">{[3,6,12,24].map(m=><button key={m} onClick={()=>setPledgeMonths(m)} className={`flex-1 py-2 rounded-lg text-sm font-bold transition-colors ${pledgeMonths===m?"bg-amber-500 text-white":"bg-white text-gray-600 border border-amber-200 hover:bg-amber-50"}`}>{m}mo</button>)}</div><div className="mt-3 bg-white rounded-lg p-3 border border-amber-200"><p className="text-xs text-gray-500">Your total pledge commitment</p><p className="text-2xl font-extrabold text-amber-700">{fmt(Number(amt)*pledgeMonths)}</p><p className="text-xs text-gray-400">{fmt(Number(amt))} &#215; {pledgeMonths} months</p></div></div>}
                  <button onClick={() => setGiveStep("confirm")} className="w-full bg-amber-500 hover:bg-amber-400 text-white font-extrabold py-4 rounded-xl text-lg">{isPledge?`Pledge ${fmt(pledgeTotal)}`:`Give ${fmt(Number(amt))}${recurring?"/"+frequency.replace("ly",""):" Now"}`}</button>
                  <p className="text-xs text-gray-400 text-center mt-3 flex items-center justify-center gap-1"><Shield size={11}/> Secure payment &#183; Powered by Stripe</p>
                </div>
                {church.fundraising&&<div className="bg-white rounded-2xl p-5 shadow-sm"><div className="flex items-center gap-2 mb-3"><Award size={18} className="text-amber-500"/><h3 className="font-extrabold text-gray-900">{church.fundraising.title}</h3></div><div className="flex items-center justify-between text-sm mb-2"><span className="text-green-700 font-extrabold">{fmt(church.fundraising.raised)} raised</span><span className="text-gray-400">of {fmt(church.fundraising.goal)} goal</span></div><div className="h-3 bg-gray-100 rounded-full overflow-hidden mb-1"><div className="h-full bg-green-500 rounded-full" style={{width:`${pct(church.fundraising.raised,church.fundraising.goal)}%`}}/></div><p className="text-xs text-gray-400">{pct(church.fundraising.raised,church.fundraising.goal)}% funded</p></div>}
              </div>
            )}
            {giveStep==="confirm"&&(
              <div className="bg-white rounded-2xl p-6 shadow-sm">
                <h2 className="font-extrabold text-gray-900 text-xl mb-5">Confirm Your Gift</h2>
                <div className="bg-gray-50 rounded-2xl p-5 mb-5 space-y-3">
                  <div className="flex justify-between text-sm"><span className="text-gray-500">Category</span><span className="font-bold text-gray-900">{giveCategory}</span></div>
                  <div className="flex justify-between text-sm"><span className="text-gray-500">Amount</span><span className="font-bold text-gray-900">{fmt(Number(amt))}{recurring?" / "+frequency:""}</span></div>
                  {isPledge&&<div className="flex justify-between text-sm"><span className="text-gray-500">Pledge Total</span><span className="font-bold text-amber-700">{fmt(pledgeTotal)} over {pledgeMonths} months</span></div>}
                  <div className="flex justify-between text-sm"><span className="text-gray-500">Church</span><span className="font-bold text-gray-900">{church.name}</span></div>
                  <div className="border-t border-gray-200 pt-3"><p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Payment Method</p><div className="flex items-center gap-3 p-3 bg-white rounded-xl border border-gray-200"><div className="w-10 h-7 bg-blue-900 rounded flex items-center justify-center text-white text-xs font-bold">VISA</div><span className="text-sm font-semibold text-gray-900">&#8226;&#8226;&#8226;&#8226;  &#8226;&#8226;&#8226;&#8226;  &#8226;&#8226;&#8226;&#8226;  4242</span></div></div>
                </div>
                <div className="flex gap-3"><button onClick={() => setGiveStep("success")} className="flex-1 bg-amber-500 hover:bg-amber-400 text-white font-extrabold py-3 rounded-xl">Confirm Gift</button><button onClick={() => setGiveStep("form")} className="px-4 py-3 rounded-xl border border-gray-200 text-gray-600 hover:bg-gray-50 font-semibold text-sm">Edit</button></div>
                <p className="text-xs text-gray-400 text-center mt-3 flex items-center justify-center gap-1"><Shield size={11}/> Your payment is encrypted and secure</p>
              </div>
            )}
            {giveStep==="success"&&(
              <div className="bg-white rounded-2xl p-8 shadow-sm text-center">
                <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4"><CheckCircle size={32} className="text-green-600"/></div>
                <h2 className="text-2xl font-extrabold text-gray-900 mb-2">Gift Received! &#128591;</h2>
                <p className="text-gray-400 mb-2">Your {isPledge?"pledge":"gift"} of <strong className="text-gray-900">{fmt(Number(amt))}</strong>{recurring?" / "+frequency:""} to {church.name} was processed successfully.</p>
                {isPledge&&<div className="bg-amber-50 border border-amber-200 rounded-xl p-3 mb-4 text-left"><p className="text-xs font-bold text-amber-700">Your {pledgeMonths}-month pledge of {fmt(pledgeTotal)} is now active.</p><p className="text-xs text-amber-600 mt-0.5">You'll be charged {fmt(Number(amt))} per month automatically.</p></div>}
                <div className="bg-blue-50 rounded-xl p-4 mb-5 text-left"><p className="text-xs font-bold text-blue-700 mb-1">Tax Receipt</p><p className="text-xs text-gray-500">A tax receipt has been sent to your email. You can also download your full giving statement from your Giving History page.</p></div>
                <div className="flex gap-3"><button onClick={() => setGiveStep("form")} className="flex-1 bg-blue-900 hover:bg-blue-800 text-white font-bold py-3 rounded-xl">Give Again</button><button onClick={() => setGiveStep("form")} className="flex-1 border border-gray-200 text-gray-600 font-bold py-3 rounded-xl hover:bg-gray-50">Done</button></div>
              </div>
            )}
          </div>
        )}
        {tab==="caring"&&<div className="max-w-2xl"><h2 className="font-extrabold text-gray-900 text-xl mb-2">Caring Ministry</h2><p className="text-gray-400 text-sm mb-5">Active needs from {church.name} members.</p><CaringMinistryFeed churchFilter={church.name}/></div>}
        {tab==="resources"&&<div className="space-y-4"><h2 className="font-extrabold text-gray-900 text-xl">Resources</h2><div className="grid grid-cols-1 sm:grid-cols-2 gap-4">{church.resources.map((r,i)=><a key={i} href="#" className="bg-white rounded-2xl p-5 shadow-sm flex items-center gap-4 hover:bg-gray-50 transition-colors"><div className="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center text-blue-700"><Link size={18}/></div><div><p className="font-bold text-gray-900">{r.title}</p><p className="text-sm text-blue-600">{r.url}</p></div><ChevronRight size={16} className="text-gray-300 ml-auto"/></a>)}</div></div>}
      </div>
    </div>
  );
}

// &#9472;&#9472;&#9472; Prayer Wall &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
function PrayerWallPage() {
  const [requests, setRequests] = useState(PRAYER_REQUESTS);
  const [showForm, setShowForm] = useState(false);
  const [anon, setAnon] = useState(false);
  const [text, setText] = useState("");
  function submit() { if(!text.trim()) return; setRequests(r=>[{id:Date.now(),author:anon?"Anonymous":"Beth",anonymous:anon,church:null,text:text.trim(),prayedCount:0,hasPrayed:false,timeAgo:"Just now"},...r]); setText(""); setShowForm(false); }
  return (
    <div className="min-h-screen bg-gray-50">
      <div className="bg-blue-900 text-white py-10 px-4 text-center">
        <h1 className="text-3xl font-extrabold mb-2">Prayer Wall</h1>
        <p className="text-blue-300 mb-6">Lift each other up. Agree together in prayer.</p>
        <button onClick={() => setShowForm(!showForm)} className="bg-amber-500 hover:bg-amber-400 text-white font-bold px-6 py-3 rounded-xl flex items-center gap-2 mx-auto"><Plus size={16}/> Share a Prayer Request</button>
      </div>
      {showForm&&<div className="max-w-3xl mx-auto px-4 py-6"><div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100"><h3 className="font-bold text-gray-900 mb-4">Share Your Prayer Request</h3><textarea rows={4} placeholder="Share what's on your heart..." value={text} onChange={e=>setText(e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none mb-3"/><label className="flex items-center gap-2 mb-4 cursor-pointer text-sm text-gray-600"><input type="checkbox" checked={anon} onChange={e=>setAnon(e.target.checked)} className="rounded"/> Post anonymously</label><div className="flex gap-3"><button onClick={submit} className="bg-blue-900 text-white font-bold px-6 py-2.5 rounded-xl hover:bg-blue-800">Submit</button><button onClick={() => setShowForm(false)} className="text-gray-500 px-4 py-2.5 rounded-xl border border-gray-200 hover:bg-gray-50">Cancel</button></div></div></div>}
      <div className="max-w-3xl mx-auto px-4 py-6 space-y-4">{requests.map(r=><PrayerCard key={r.id} request={r}/>)}</div>
    </div>
  );
}

// &#9472;&#9472;&#9472; Caring Ministry Page &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;

    <div className="min-h-screen bg-gray-50">
      <div className="bg-blue-900 text-white py-10 px-4 text-center"><h1 className="text-3xl font-extrabold mb-2">Caring Ministry</h1><p className="text-blue-300 max-w-xl mx-auto">Real needs from real people in your church family. Show up for each other.</p></div>

// &#9472;&#9472;&#9472; Events Page &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
function EventsPage({ setPage, setChurch }) {

  const [filter, setFilter] = useState("All Denominations");
  const allEvents = CHURCHES.filter(c => filter==="All Denominations"||c.denomination===filter).flatMap(c => c.events.map(e => ({...e, key:`${c.id}-${e.id}`, churchObj:c})));

    <div className="min-h-screen bg-gray-50">
      <div className="bg-blue-900 text-white py-10 px-4">
        <div className="max-w-7xl mx-auto"><h1 className="text-3xl font-extrabold mb-2">Events</h1><p className="text-blue-300 mb-5">Upcoming events from churches across the Fidexus community.</p><div className="flex items-center gap-2 bg-white rounded-xl px-4 py-3 max-w-xs"><ChevronDown size={15} className="text-gray-400"/><select value={filter} onChange={e=>setFilter(e.target.value)} className="text-gray-700 text-sm focus:outline-none bg-transparent w-full">{DENOMINATIONS.map(d=><option key={d}>{d}</option>)}</select></div></div>
      </div>
      <div className="max-w-7xl mx-auto px-4 py-8">
        {allEvents.length===0?<div className="text-center py-16"><div className="text-5xl mb-4">&#128197;</div><p className="text-gray-400 text-lg">No upcoming events for this filter.</p></div>
        :<div className="grid grid-cols-1 md:grid-cols-2 gap-5">{allEvents.map(e=>(
          <div key={e.key} className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
            <div className="flex items-start gap-4">
              <div className={`bg-gradient-to-br ${cardGrad[e.churchObj.color]||"from-blue-700 to-blue-900"} rounded-xl p-3 text-white flex-shrink-0 text-center min-w-14`}><p className="text-xs font-bold opacity-70">{e.date.split(" ")[0]}</p><p className="text-2xl font-extrabold leading-none">{e.date.split(" ")[1]?.replace(",","")}</p></div>
              <div className="flex-1 min-w-0"><h3 className="font-extrabold text-gray-900 text-base mb-0.5">{e.title}</h3><button onClick={() => { setChurch(e.churchObj); setPage("church"); }} className="text-sm text-blue-700 font-bold hover:underline mb-1 block">{e.churchObj.name}</button><p className="text-xs text-gray-400 mb-2">{e.date} &#183; {e.time}</p><p className="text-sm text-gray-500 leading-relaxed">{e.description}</p><div className="flex items-center justify-between mt-3"><span className="text-xs text-gray-400 flex items-center gap-1"><Users size={11}/>{e.rsvpd} attending &#183; {e.slots-e.rsvpd} spots left</span><button onClick={()=>setRsvpd(r=>({...r,[e.key]:!r[e.key]}))} className={`text-sm font-bold px-4 py-1.5 rounded-xl transition-colors ${rsvpd[e.key]?"bg-green-600 text-white":"bg-blue-900 text-white hover:bg-blue-800"}`}>{rsvpd[e.key]?"RSVP'd &#10003;":"RSVP"}</button></div></div>
            </div>
          </div>
        ))}</div>}
      </div>
    </div>

// &#9472;&#9472; MEMBER INBOX PAGE &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
function MemberInboxPage({ user, setPage }) {
  const [readIds, setReadIds] = useState([]);
  const [expanded, setExpanded] = useState(null);

  function toggleRead(id) {
    setReadIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  }
  function handleExpand(id) {
    setExpanded(expanded === id ? null : id);
    if (!readIds.includes(id)) setReadIds(prev => [...prev, id]);
  }

  const unread = ANNOUNCEMENTS.filter(a => !readIds.includes(a.id)).length;

  return (
    <div className="min-h-screen bg-gray-50">
      <div className="max-w-3xl mx-auto px-4 py-10">
        <div className="flex items-center gap-3 mb-2">
          <button onClick={() => setPage("dashboard")} className="text-blue-700 hover:text-blue-900 font-semibold text-sm flex items-center gap-1">
            <ChevronLeft size={16}/> Dashboard
          </button>
        </div>
        <div className="flex items-center justify-between mb-1">
          <h1 className="font-extrabold text-gray-900 text-3xl">Inbox</h1>
          {unread > 0 && <span className="bg-red-500 text-white text-sm font-extrabold px-3 py-1 rounded-full">{unread} unread</span>}
        </div>
        <p className="text-gray-500 mb-6">Messages and announcements from your church.</p>

        {/* Mark all read */}
        {unread > 0 && (
          <button onClick={() => setReadIds(ANNOUNCEMENTS.map(a => a.id))} className="mb-4 text-sm text-blue-700 font-semibold hover:text-blue-900 flex items-center gap-1">
            <CheckCircle size={14}/> Mark all as read
          </button>
        )}

        <div className="space-y-3">
          {ANNOUNCEMENTS.map(a => {
            const isRead = readIds.includes(a.id);
            const isExpanded = expanded === a.id;
            return (
              <div key={a.id} className={`bg-white rounded-2xl border transition-all shadow-sm hover:shadow-md cursor-pointer ${isRead ? "border-gray-100" : "border-l-4 border-l-blue-600 border-t-gray-100 border-r-gray-100 border-b-gray-100"}`} onClick={() => handleExpand(a.id)}>
                <div className="p-5">
                  <div className="flex items-start justify-between gap-3">
                    <div className="flex items-start gap-3 flex-1 min-w-0">
                      <div className={`w-2.5 h-2.5 rounded-full mt-1.5 flex-shrink-0 ${isRead ? "bg-gray-200" : "bg-blue-600"}`}/>
                      <div className="min-w-0">
                        <div className="flex items-center gap-2 flex-wrap mb-0.5">
                          <span className="text-xs font-bold text-blue-700">{a.church}</span>
                          <span className="text-xs text-gray-400">{a.date}</span>
                        </div>
                        <h3 className={`text-base leading-snug ${isRead ? "text-gray-600 font-semibold" : "text-gray-900 font-extrabold"}`}>{a.title}</h3>
                        {!isExpanded && <p className="text-gray-400 text-xs mt-1 truncate">{a.body}</p>}
                      </div>
                    </div>
                    <ChevronRight size={16} className={`text-gray-300 flex-shrink-0 mt-1 transition-transform ${isExpanded ? "rotate-90" : ""}`}/>
                  </div>

                  {isExpanded && (
                    <div className="mt-4 ml-5 pl-0 border-t border-gray-100 pt-4">
                      <p className="text-gray-700 text-sm leading-relaxed mb-3">{a.body}</p>
                      {a.tags && (
                        <div className="flex gap-2 flex-wrap mb-3">
                          {a.tags.map(t => <span key={t} className="bg-amber-50 text-amber-700 text-xs font-semibold px-2.5 py-1 rounded-full">{t}</span>)}
                        </div>
                      )}
                      <button onClick={e => { e.stopPropagation(); toggleRead(a.id); }} className="text-xs text-gray-400 hover:text-gray-600 font-semibold flex items-center gap-1">
                        {isRead ? <><Circle size={12}/> Mark as unread</> : <><CheckCircle size={12}/> Mark as read</>}
                      </button>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>

        {ANNOUNCEMENTS.length === 0 && (
          <div className="text-center py-16 text-gray-400">
            <div className="text-5xl mb-3">&#128236;</div>
            <p className="font-semibold">Your inbox is empty.</p>
          </div>
        )}
      </div>
    </div>
  );
}

            })}
          </div>
        </div>
      </div>
    </div>
  );
}

            <h2 className="font-extrabold text-gray-900 text-2xl mb-2">Sign In Required</h2>
            <p className="text-gray-500 mb-6">Please sign in to access your dashboard and member features.</p>
            <button onClick={() => setAuthModal("login")} className="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-3 rounded-xl mb-3">Sign In</button>
            <button onClick={() => setPage("home")} className="text-sm text-gray-400 hover:text-gray-600 font-semibold">&#8592; Back to Home</button>
          </div>
        </div>
      )}

      {/* Floating Dashboard Button */}
      {user && innerPages.includes(page) && page !== "dashboard" && (
        <button
          onClick={() => setPage("dashboard")}
          className="fixed bottom-6 right-6 z-40 bg-blue-900 hover:bg-blue-800 text-white font-bold px-5 py-3 rounded-full shadow-xl flex items-center gap-2 text-sm transition-all hover:scale-105"
        >
          <Home size={16}/> Dashboard
        </button>
      )}

      {/* Auth Modal */}
      {authModal && (
        <AuthModal type={authModal} onClose={() => setAuthModal(null)} onLogin={handleLogin}/>
      )}

      {/* Church Admin Panel */}
      {showAdmin && (
        <ChurchAdminPanel onClose={() => setShowAdmin(false)}/>
      )}

      {/* Footer &#8212; only show on non-app pages */}
      {["home","find","pray","caring","events","give","bulletins","devotional","church"].includes(page) && (
        <Footer setPage={setPage}/>
      )}
    </div>
  );
}


    createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
